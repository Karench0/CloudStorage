version: '3.8'

services:
  db:
    image: postgres:15
    container_name: my_postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres        
      POSTGRES_PASSWORD: 6852 
      POSTGRES_DB: cloud_storage
    ports:
      - "5432:5432"
    volumes:

      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: cloud_storage_minio
    restart: unless-stopped
    ports:
      - "9000:9000"   
      - "9001:9001"   
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data: