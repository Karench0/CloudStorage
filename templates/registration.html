{{ template "header" . }}

<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <h3 class="text-center fw-bold mb-4">Регистрация</h3>
                
                {{ if .error }}
                <div class="alert alert-danger py-2 small">{{ .error }}</div>
                {{ end }}

                <form method="post">
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">Придумайте логин</label>
                        <input type="text" name="username" class="form-control" required placeholder="Ваш никнейм">
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label text-muted small fw-bold">Пароль</label>
                        <input type="password" name="password" id="passwordInput" class="form-control" required minlength="6" placeholder="Минимум 6 символов">
                        <small id="passwordHint" class="text-danger d-none mt-1">Пароль должен содержать минимум 6 символов</small>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 fw-bold py-2">Зарегистрироваться</button>
                </form>
                
                <script>
                    const passwordInput = document.getElementById('passwordInput');
                    const passwordHint = document.getElementById('passwordHint');
                    
                    passwordInput.addEventListener('input', function() {
                        if (this.value.length < 6 && this.value.length > 0) {
                            passwordHint.classList.remove('d-none');
                        } else {
                            passwordHint.classList.add('d-none');
                        }
                    });
                </script>
                
                <div class="text-center mt-4">
                    <span class="text-muted small">Уже есть аккаунт?</span>
                    <a href="/login" class="small fw-bold text-decoration-none">Войти</a>
                </div>
            </div>
        </div>
    </div>
</div>

{{ template "footer" . }}
