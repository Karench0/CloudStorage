{{ define "header" }}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .title }} | Облачное хранилище</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root { --primary-blue: #2563eb; --bg-light: #f1f5f9; }
        body { background-color: var(--bg-light); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        .navbar-custom { 
            position: relative;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%) !important; 
            padding: 1.2rem 0; 
            overflow: hidden;
        }

        .navbar-custom::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='48' height='48' viewBox='0 0 16 16'><path fill='white' fill-opacity='0.05' d='M13.405 7.027a5 5 0 0 0-9.268-2.118A3.5 3.5 0 0 0 4.5 12h8.5a3 3 0 0 0 .405-5.973z'/></svg>");
            background-repeat: repeat;
            background-size: 150px 150px; 
            pointer-events: none;
        }
        
        .navbar-brand { font-weight: 800; letter-spacing: -0.5px; z-index: 2; }
        .navbar-nav-content { z-index: 2; }
        
        .user-badge {
            background: rgba(255,255,255,0.08);
            padding: 6px 16px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.15);
            backdrop-filter: blur(4px);
        }

        .upload-zone.is-invalid {
            outline: 2px solid #dc3545;
            outline-offset: 2px;
            background-color: rgba(220, 53, 69, 0.06);
        }
        .upload-zone.is-invalid .form-control {
            border-color: #dc3545;
        }
        .upload-zone.shake {
            animation: upload-shake 0.45s ease-in-out;
        }
        @keyframes upload-shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }

        .browse-row.folder-row,
        .browse-row.file-row-preview {
            cursor: pointer;
        }
        .browse-row.folder-row:hover,
        .browse-row.file-row-preview:hover {
            background-color: rgba(37, 99, 235, 0.06);
        }
        .preview-frame {
            width: 100%;
            height: 75vh;
            border: 0;
        }
        .preview-text {
            max-height: 75vh;
            overflow: auto;
            font-size: 0.85rem;
            line-height: 1.45;
            background: #0f172a;
            color: #e2e8f0;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .preview-image {
            max-height: 75vh;
            object-fit: contain;
        }
    </style>
</head>
<body>

<header class="navbar navbar-expand-lg navbar-dark navbar-custom shadow-sm mb-4">
    <div class="container navbar-nav-content position-relative">
        <a class="navbar-brand d-flex align-items-center text-white" href="/">
             Облачное хранилище
        </a>

        {{ if .Username }}
        <div class="d-flex align-items-center">
            <div class="user-badge text-white me-3 d-none d-sm-block">
                <i class="bi bi-person-fill me-1 text-info"></i> {{ .Username }}
            </div>
            
            <button type="button" class="btn btn-danger btn-sm fw-bold px-3" 
                    data-bs-toggle="modal" data-bs-target="#logoutModal">
                Выйти
            </button>
        </div>
        {{ else }}
        <a href="/login" class="btn btn-outline-light btn-sm px-4">Войти</a>
        {{ end }}
    </div>
</header>

<div class="modal fade" id="logoutModal" tabindex="-1" aria-labelledby="logoutModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-light">
                <h5 class="modal-title fw-bold" id="logoutModalLabel">Завершение сеанса</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body text-center py-4">
                <i class="bi bi-exclamation-triangle text-warning fs-1"></i>
                <p class="mt-3 fs-5">Вы уверены, что хотите выйти из аккаунта?</p>
            </div>
            <div class="modal-footer border-0 justify-content-center pb-4">
                <button type="button" class="btn btn-secondary px-4" data-bs-dismiss="modal">Отмена</button>
                <a href="/logout" class="btn btn-danger px-4">Да, выйти</a>
            </div>
        </div>
    </div>
</div>

<div class="container">
{{ end }}

{{ define "footer" }}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
{{ end }}
