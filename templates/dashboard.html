{{ template "header" . }}

<div class="row g-4">
    <div class="col-md-3">
        <div class="d-grid gap-2">
            <button class="btn btn-primary fw-bold shadow-sm py-2">
                <i class="bi bi-cloud-arrow-up-fill me-2"></i> Загрузить файл
            </button>
            <div class="list-group list-group-flush mt-3 small shadow-sm rounded">
                <a href="#" class="list-group-item list-group-item-action active">
                    <i class="bi bi-files me-2"></i> Мои файлы
                </a>
                <a href="#" class="list-group-item list-group-item-action text-muted">
                    <i class="bi bi-star me-2"></i> Избранное
                </a>
                <a href="#" class="list-group-item list-group-item-action text-muted">
                    <i class="bi bi-trash me-2"></i> Корзина
                </a>
            </div>
        </div>
    </div>

    <div class="col-md-9">
        <div class="card border-0 shadow-sm overflow-hidden">
            <div class="card-header bg-white py-3 border-bottom-0">
                <h5 class="mb-0 fw-bold">Ваши файлы</h5>
            </div>
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr class="small text-muted text-uppercase">
                            <th class="ps-4">Название</th>
                            <th>Размер</th>
                            <th>Дата</th>
                            <th class="text-end pe-4">Действия</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- <tr>
                            <td class="ps-4">
                                <i class="bi bi-file-earmark-pdf text-danger me-2"></i>
                                <span class="fw-medium">Курсовой_проект.pdf</span>
                            </td>
                            <td class="text-muted small">2.4 MB</td>
                            <td class="text-muted small">Сегодня, 14:20</td>
                            <td class="text-end pe-4">
                                <button class="btn btn-link text-primary p-0 me-2"><i class="bi bi-download"></i></button>
                                <button class="btn btn-link text-danger p-0"><i class="bi bi-trash"></i></button>
                            </td>
                        </tr> -->
                        {{ if not .Files }}
                        <tr>
                            <td colspan="4" class="text-center py-5 text-muted">
                                <i class="bi bi-folder2-open fs-1 d-block mb-2"></i>
                                <p>Файлов пока нет. Загрузите первый!</p>
                            </td>
                        </tr>
                        {{ end }}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

{{ template "footer" . }}
